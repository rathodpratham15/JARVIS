<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#020817"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.2"/>
  <!-- Corner brackets -->
  <path d="M40,40 L40,80 M40,40 L80,40" stroke="#00d4ff" stroke-width="6" fill="none" opacity="0.7"/>
  <path d="M472,40 L472,80 M472,40 L432,40" stroke="#00d4ff" stroke-width="6" fill="none" opacity="0.7"/>
  <path d="M40,472 L40,432 M40,472 L80,472" stroke="#00d4ff" stroke-width="6" fill="none" opacity="0.7"/>
  <path d="M472,472 L472,432 M472,472 L432,472" stroke="#00d4ff" stroke-width="6" fill="none" opacity="0.7"/>
  <!-- J letter -->
  <text x="256" y="320" font-family="Arial, sans-serif" font-weight="900" font-size="220"
        text-anchor="middle" fill="#00d4ff"
        filter="url(#glow)">J</text>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
