<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" fill="#020817"/>
  <!-- Outer ring -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
  <circle cx="96" cy="96" r="80" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
  <!-- Corner brackets (HUD style) -->
  <path d="M20,20 L20,36 M20,20 L36,20" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M172,20 L172,36 M172,20 L156,20" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M20,172 L20,156 M20,172 L36,172" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M172,172 L172,156 M172,172 L156,172" stroke="#00d4ff" stroke-width="3" fill="none" opacity="0.7"/>
  <!-- J letter -->
  <text x="96" y="118" font-family="Arial, sans-serif" font-weight="900" font-size="82"
        text-anchor="middle" fill="#00d4ff"
        filter="url(#glow)">J</text>
  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
